{% extends 'base.html' %}
{% block content %}

<div class="p-5 text-center bg-white rounded-3 shadow-sm border-top border-warning border-4 mb-5">
    <h1 class="text-body-emphasis fw-bold mb-3">Cripto Wallet GODOYCRUZ</h1>
    <p class="lead text-muted">Gestiona tus fondos de forma descentralizada y segura.</p>
    
    <div class="d-inline-flex align-items-center bg-light p-3 rounded-pill shadow-sm border mt-3">
        <span class="fs-4 text-secondary me-3">Balance Total:</span>
        <span class="display-6 fw-bold text-warning mb-0">🪙 {{ wallet_balance }} GC</span>
    </div>
</div>

<div class="row g-4 mb-5">
    
    <div class="col-12 col-md-4">
        <div class="card h-100 shadow border-0 border-top border-success border-4 transition-transform">
            <div class="card-body d-flex flex-column p-4">
                <h4 class="card-title fw-bold mb-4 text-dark">Comprar GC</h4>
                <form method="POST" class="mt-auto">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <input type="hidden" name="action" value="buy">
                    
                    <div class="mb-4">
                        <label class="form-label text-secondary fw-bold">Cantidad a añadir:</label>
                        <input type="number" name="amount" placeholder="Ej. 100" min="1" required class="form-control form-control-lg bg-light">
                    </div>
                    
                    <button type="submit" class="btn btn-dark btn-lg fw-bold w-100 shadow-sm">
                        Pagar con Tarjeta
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-12 col-md-4">
        <div class="card h-100 shadow border-0 border-top border-danger border-4 transition-transform">
            <div class="card-body d-flex flex-column p-4">
                <h4 class="card-title fw-bold mb-4 text-dark">Vender GC a €</h4>
                <form method="POST" class="mt-auto">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <input type="hidden" name="action" value="sell">
                    
                    <div class="mb-4">
                        <label class="form-label text-secondary fw-bold">Cantidad a retirar:</label>
                        <input type="number" name="amount" placeholder="Ej. 50" min="1" required class="form-control form-control-lg bg-light">
                    </div>
                    
                    <button type="submit" class="btn btn-dark btn-lg fw-bold w-100 shadow-sm">
                        Retirar a Banco
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-12 col-md-4">
        <div class="card h-100 shadow border-0 border-top border-primary border-4 transition-transform">
            <div class="card-body d-flex flex-column p-4">
                <h4 class="card-title fw-bold mb-4 text-dark">Transferir a Usuario</h4>
                <form method="POST" class="mt-auto">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <input type="hidden" name="action" value="transfer">
                    
                    <div class="mb-3">
                        <label class="form-label text-secondary fw-bold">Destinatario:</label>
                        <select name="target" class="form-select form-select-lg bg-light fw-semibold">
                            {% for u in users_list %}
                                {% if u != current_user %}
                                <option value="{{ u }}">👤 {{ u }}</option>
                                {% endif %}
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-secondary fw-bold">Cantidad:</label>
                        <input type="number" name="amount" placeholder="Ej. 20" min="1" required class="form-control form-control-lg bg-light">
                    </div>
                    
                    <button type="submit" class="btn btn-dark btn-lg fw-bold w-100 shadow-sm">
                        Enviar GC
                    </button>
                </form>
            </div>
        </div>
    </div>

</div>

<style>
    .transition-transform { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .transition-transform:hover { transform: translateY(-5px); box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important; }
</style>

{% endblock %}
